name: Seed Next Dev Version

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: "Next version (e.g., 2.0.0)"
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create dev seed tag
        run: |
          TAG="v${{ inputs.next_version }}-dev.0"
          echo "Creating tag $TAG"
          git tag $TAG
          git push origin $TAG