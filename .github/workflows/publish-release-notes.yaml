name: Publish Release Notes

on:
  workflow_call:

jobs:
  publish-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24.10.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.10.0"

      - id: run-semantic-release
        name: Publish release notes
        env:
          RELEASE_BRANCHES: ${{ startsWith(github.ref_name, 'release/') && format('[{{"name":"main"}},{{"name":"dev","prerelease":"dev"}},{{"name":"{0}","prerelease":"rc"}}]', github.ref_name) || '' }}
        run: |
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }} npx semantic-release --debug --verbose
