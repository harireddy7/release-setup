name: Publish Release Notes

on:
  workflow_call:

jobs:
  publish-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24.10.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.10.0"

      - id: run-semantic-release
        name: Publish release notes
        run: |
          IS_RELEASE="${{ startsWith(github.ref_name, 'release/') }}"
          if [[ "${IS_RELEASE}" == 'true' ]]; then
            RELEASE_BRANCH="${{ github.ref_name }}"
            jq --arg branch "$RELEASE_BRANCH" \
              '.branches += [{name: $branch, prerelease: "rc"}]' \
              .releaserc.json > .releaserc.tmp.json && mv .releaserc.tmp.json .releaserc.json
          fi
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }} npx semantic-release --debug --verbose
