name: Cut Release Branch

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Release branch name (e.g., release/2.0.0)"
        required: true
      release_type:
        description: "Release type"
        required: true
        default: "minor"
        type: choice
        options:
          - major
          - minor
          - patch
      next_release:
        description: "Next release version for dev (e.g., 2.1.0)"
        required: true

jobs:
  cut-release-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into dev
        run: |
          git merge origin/main --no-edit
          echo "Merged main into dev to ensure stable tag is reachable"

      - name: Create and push release branch
        run: |
          git checkout -b "${{ inputs.release_branch }}"
          RELEASE_VERSION="${{ inputs.release_branch }}"
          RELEASE_VERSION="${RELEASE_VERSION#release/}"

          if [[ "${{ inputs.release_type }}" == "major" ]]; then
            git commit --allow-empty -m "feat: release ${RELEASE_VERSION}" -m "BREAKING CHANGE: release ${RELEASE_VERSION}"
          elif [[ "${{ inputs.release_type }}" == "minor" ]]; then
            git commit --allow-empty -m "feat: release ${RELEASE_VERSION}"
          else
            git commit --allow-empty -m "fix: release ${RELEASE_VERSION}"
          fi
          git push origin "${{ inputs.release_branch }}"
          echo "Created release branch: ${{ inputs.release_branch }}"

      - name: Checkout back to dev
        run: |
          git checkout dev

      - name: Setup Node v24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bump package.json version on dev
        run: |
          npm pkg set version="${{ inputs.next_release }}-dev.0"
          echo "Bumped dev to $(node -p "require('./package.json').version")"

      - name: Commit version bump to dev
        run: |
          git add package.json
          git commit -m "chore: seed next release version ${{ inputs.next_release }}"
          git push origin dev

      - name: Create dev seed tag
        run: |
          TAG="v${{ inputs.next_release }}-dev.0"
          echo "Creating tag $TAG"
          git tag $TAG
          git push origin $TAG
