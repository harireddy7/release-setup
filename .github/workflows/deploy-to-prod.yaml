name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Release branch to deploy (e.g., release/2.0.0)"
        required: true

jobs:
  deploy-to-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Log git tags on branch
        run: |
          RELEASE_VERSION="${{ inputs.release_branch }}"
          RELEASE_VERSION="${RELEASE_VERSION#release/}"

          echo "=== All tags reachable from ${{ inputs.release_branch }} ==="
          git tag --merged HEAD --sort=-v:refname

          echo ""
          echo "=== Most recent tag ==="
          git describe --tags --abbrev=0

          echo ""
          echo "=== RC tags for v${RELEASE_VERSION} ==="
          git tag --merged HEAD --sort=-v:refname | grep "^v${RELEASE_VERSION}-rc\." || echo "No rc tags found"

      - name: Create PR from release branch to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION="${{ inputs.release_branch }}"
          RELEASE_VERSION="${RELEASE_VERSION#release/}"
          gh pr create \
            --base main \
            --head "${{ inputs.release_branch }}" \
            --title "Release v${RELEASE_VERSION}" \
            --body "Merging \`${{ inputs.release_branch }}\` into \`main\` to publish stable release \`v${RELEASE_VERSION}\`." \
            --label "release" \
            --label "$RELEASE_VERSION"
